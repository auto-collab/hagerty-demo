version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Containerfile
    container_name: demo-api
    environment:
      - PORT=8080
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.5"
    networks:
      - demo-network
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Containerfile
    entrypoint: ["sh", "client.sh"]
    container_name: demo-client
    environment:
      - API_HOST=api
      - API_PORT=8080
      - INTERVAL=3
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: "0.25"
    networks:
      - demo-network
    depends_on:
      - api
    restart: unless-stopped
networks:
  demo-network:
    driver: bridge